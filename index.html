<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python OOP Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #141414;
    --card: #1a1a1a;
    --border: #2a2a2a;
    --accent: #00ff88;
    --accent2: #ff6b35;
    --accent3: #4facfe;
    --text: #f0f0f0;
    --muted: #666;
    --correct: #00ff88;
    --wrong: #ff4444;
    --pending: #ffd700;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* GRID BG */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  header {
    position: relative;
    z-index: 10;
    padding: 40px 24px 0;
    text-align: center;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 16px;
    opacity: 0.8;
  }

  h1 {
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 800;
    line-height: 1.1;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    font-family: 'Space Mono', monospace;
  }

  /* SCORE BAR */
  .score-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(13,13,13,0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .score-info {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--accent);
  }

  .progress-wrap {
    flex: 1;
    max-width: 300px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .score-num {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--text);
  }

  /* NAV TABS */
  .nav-section {
    position: relative;
    z-index: 10;
    padding: 32px 24px 0;
    max-width: 900px;
    margin: 0 auto;
  }

  .chapter-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .chapter-btn {
    padding: 10px 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .chapter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .chapter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 700;
  }

  .type-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .type-btn {
    padding: 7px 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
  }

  .type-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .type-btn.active {
    background: var(--accent2);
    border-color: var(--accent2);
    color: #fff;
    font-weight: 600;
  }

  /* MAIN CONTENT */
  main {
    position: relative;
    z-index: 10;
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 24px 80px;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .section-tag {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 3px;
    background: var(--accent);
    color: #000;
    font-weight: 700;
  }

  .section-tag.tf { background: var(--pending); }
  .section-tag.essay { background: var(--accent3); color: #000; }

  .section-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }

  .q-count {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
  }

  /* QUESTION CARD */
  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 16px;
    transition: border-color 0.3s;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-card.answered-correct { border-color: var(--correct); background: rgba(0,255,136,0.04); }
  .q-card.answered-wrong { border-color: var(--wrong); background: rgba(255,68,68,0.04); }
  .q-card.answered-partial { border-color: var(--pending); }

  .q-num {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 10px;
    letter-spacing: 1px;
  }

  .q-text {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 16px;
    color: var(--text);
  }

  .q-code {
    background: #0a0a0a;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: #a8d8a8;
    margin-bottom: 14px;
    white-space: pre-wrap;
    line-height: 1.6;
  }

  /* MCQ OPTIONS */
  .options {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .option-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    width: 100%;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--accent3);
    background: rgba(79,172,254,0.06);
    transform: translateX(3px);
  }

  .option-btn:disabled { cursor: default; }

  .option-letter {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    min-width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    border: 1px solid var(--border);
    color: var(--muted);
    transition: all 0.15s;
  }

  .option-btn.correct { border-color: var(--correct); background: rgba(0,255,136,0.1); }
  .option-btn.correct .option-letter { background: var(--correct); color: #000; border-color: var(--correct); }
  .option-btn.wrong { border-color: var(--wrong); background: rgba(255,68,68,0.1); }
  .option-btn.wrong .option-letter { background: var(--wrong); color: #fff; border-color: var(--wrong); }
  .option-btn.reveal-correct { border-color: var(--correct); opacity: 0.7; }
  .option-btn.reveal-correct .option-letter { border-color: var(--correct); color: var(--correct); }

  .feedback {
    margin-top: 12px;
    padding: 10px 14px;
    border-radius: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    display: none;
  }

  .feedback.show { display: block; }
  .feedback.correct { background: rgba(0,255,136,0.1); color: var(--correct); border: 1px solid rgba(0,255,136,0.2); }
  .feedback.wrong { background: rgba(255,68,68,0.1); color: var(--wrong); border: 1px solid rgba(255,68,68,0.2); }

  /* TRUE/FALSE */
  .tf-options {
    display: flex;
    gap: 10px;
  }

  .tf-btn {
    flex: 1;
    padding: 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }

  .tf-btn:hover:not(:disabled) { transform: translateY(-2px); }
  .tf-btn.true-btn:hover:not(:disabled) { border-color: var(--correct); color: var(--correct); }
  .tf-btn.false-btn:hover:not(:disabled) { border-color: var(--wrong); color: var(--wrong); }
  .tf-btn:disabled { cursor: default; }
  .tf-btn.correct { border-color: var(--correct); background: rgba(0,255,136,0.1); color: var(--correct); }
  .tf-btn.wrong { border-color: var(--wrong); background: rgba(255,68,68,0.1); color: var(--wrong); }
  .tf-btn.reveal { border-color: var(--correct); color: var(--correct); opacity: 0.6; }

  .correction-note {
    margin-top: 10px;
    padding: 10px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    background: rgba(255,215,0,0.08);
    border: 1px solid rgba(255,215,0,0.2);
    color: var(--pending);
    display: none;
  }
  .correction-note.show { display: block; }

  /* ESSAY */
  .essay-area {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    resize: vertical;
    min-height: 100px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.6;
  }

  .essay-area:focus { border-color: var(--accent3); }

  .essay-actions {
    display: flex;
    gap: 10px;
    margin-top: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  .check-btn {
    padding: 10px 20px;
    background: var(--accent3);
    border: none;
    border-radius: 6px;
    color: #000;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .check-btn:hover { opacity: 0.85; }

  .model-answer {
    margin-top: 12px;
    padding: 12px 16px;
    background: rgba(79,172,254,0.06);
    border: 1px solid rgba(79,172,254,0.2);
    border-radius: 8px;
    font-size: 13px;
    color: var(--accent3);
    font-family: 'Space Mono', monospace;
    line-height: 1.6;
    display: none;
    white-space: pre-wrap;
  }

  .model-answer.show { display: block; }
  .model-answer strong { color: var(--text); font-family: 'Syne', sans-serif; display: block; margin-bottom: 6px; }

  /* RESULTS SCREEN */
  #results-screen {
    display: none;
    text-align: center;
    padding: 60px 24px;
    animation: fadeIn 0.5s ease;
  }

  .results-ring {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    border: 4px solid var(--border);
    margin: 0 auto 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    background: conic-gradient(var(--accent) 0%, var(--border) 0%);
    transition: background 1s ease;
  }

  .results-ring-inner {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .result-pct {
    font-family: 'Space Mono', monospace;
    font-size: 32px;
    font-weight: 700;
    color: var(--accent);
  }

  .result-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; }

  .result-breakdown {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .rb-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 24px;
    min-width: 100px;
  }

  .rb-val {
    font-family: 'Space Mono', monospace;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .rb-val.g { color: var(--correct); }
  .rb-val.r { color: var(--wrong); }
  .rb-val.y { color: var(--pending); }

  .rb-label { font-size: 11px; color: var(--muted); }

  .restart-btn {
    padding: 14px 36px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #000;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }

  .restart-btn:hover { opacity: 0.85; transform: scale(1.02); }

  /* SHOW ALL btn */
  .show-all-btn {
    display: block;
    width: 100%;
    padding: 14px;
    margin-top: 8px;
    border: 1px dashed var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.2s;
  }
  .show-all-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
  }

  /* FINISH BTN */
  .finish-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 50;
    background: rgba(13,13,13,0.97);
    border-top: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    justify-content: center;
  }

  .finish-btn {
    padding: 13px 48px;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    border: none;
    border-radius: 8px;
    color: #000;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .finish-btn:hover { opacity: 0.85; }

  @media (max-width: 600px) {
    .q-card { padding: 16px; }
    .option-btn { font-size: 13px; }
    h1 { font-size: 26px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">● Python Course — Quiz System</div>
  <h1>Study Quiz</h1>
  <p class="subtitle">Ch.1 OOP &nbsp;|&nbsp; Ch.2 Data Structures &nbsp;|&nbsp; Ch.3 GUI</p>
</header>

<div class="score-bar">
  <span class="score-info" id="score-label">Score: 0 / 0</span>
  <div class="progress-wrap"><div class="progress-fill" id="progress-fill"></div></div>
  <span class="score-num" id="answered-label">0 answered</span>
</div>

<div class="nav-section">
  <div class="chapter-tabs" id="chapter-tabs"></div>
  <div class="type-tabs" id="type-tabs"></div>
</div>

<main id="main-content"></main>

<div class="finish-bar">
  <button class="finish-btn" onclick="showResults()">🎯 Show My Results</button>
</div>

// ============================================================
// STATE
// ============================================================
let currentChapter = 'ch1';
let currentType = 'mcq';
let answers = {}; // key: "ch-type-idx" => { selected, correct }
let essayShown = {}; // key: "ch-type-idx" => true/false

function getKey(ch, type, idx) { return `${ch}-${type}-${idx}`; }

function getStats() {
  let total = 0, correct = 0, answered = 0;
  for (const [key, val] of Object.entries(answers)) {
    if (val.correct !== undefined) {
      total++;
      answered++;
      if (val.correct) correct++;
    }
  }
  // Count essay shown as answered
  for (const key of Object.keys(essayShown)) {
    answered++;
    total++;
  }
  return { total, correct, answered };
}

function getTotalQuestions() {
  let t = 0;
  for (const ch of Object.values(DATA)) {
    t += ch.mcq.length + ch.tf.length + ch.essay.length;
  }
  return t;
}

function updateScoreBar() {
  let correct = 0, answered = 0;
  for (const val of Object.values(answers)) {
    if (val.correct !== undefined) { answered++; if (val.correct) correct++; }
  }
  const essayCount = Object.keys(essayShown).length;
  answered += essayCount;
  const total = getTotalQuestions();
  document.getElementById('score-label').textContent = `Score: ${correct} / ${answered}`;
  document.getElementById('answered-label').textContent = `${answered} / ${total} answered`;
  const pct = (answered / total) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
}

// ============================================================
// RENDER NAV
// ============================================================
function renderNav() {
  const cTabs = document.getElementById('chapter-tabs');
  cTabs.innerHTML = '';
  for (const [key, ch] of Object.entries(DATA)) {
    const btn = document.createElement('button');
    btn.className = 'chapter-btn' + (key === currentChapter ? ' active' : '');
    btn.textContent = ch.label + ' — ' + ch.subtitle;
    btn.onclick = () => { currentChapter = key; renderNav(); renderContent(); };
    cTabs.appendChild(btn);
  }

  const tTabs = document.getElementById('type-tabs');
  tTabs.innerHTML = '';
  const types = [
    { key: 'mcq', label: '📝 Multiple Choice' },
    { key: 'tf', label: '✅ True / False' },
    { key: 'essay', label: '✍️ Essay' },
  ];
  for (const t of types) {
    const btn = document.createElement('button');
    btn.className = 'type-btn' + (t.key === currentType ? ' active' : '');
    btn.textContent = t.label;
    btn.onclick = () => { currentType = t.key; renderNav(); renderContent(); };
    tTabs.appendChild(btn);
  }
}

// ============================================================
// RENDER CONTENT
// ============================================================
function renderContent() {
  const main = document.getElementById('main-content');
  const ch = DATA[currentChapter];
  const questions = ch[currentType];

  if (!questions || questions.length === 0) {
    main.innerHTML = '<div class="empty-state">NO QUESTIONS IN THIS SECTION</div>';
    return;
  }

  const tagLabel = currentType === 'mcq' ? 'MCQ' : currentType === 'tf' ? 'T/F' : 'Essay';
  const tagClass = currentType === 'mcq' ? '' : currentType === 'tf' ? 'tf' : 'essay';

  let html = `<div class="section-header">
    <span class="section-tag ${tagClass}">${tagLabel}</span>
    <span class="section-title">${ch.label} — ${ch.subtitle}</span>
    <span class="q-count">${questions.length} questions</span>
  </div>`;

  questions.forEach((q, idx) => {
    const key = getKey(currentChapter, currentType, idx);
    if (currentType === 'mcq') {
      html += renderMCQ(q, idx, key);
    } else if (currentType === 'tf') {
      html += renderTF(q, idx, key);
    } else {
      html += renderEssay(q, idx, key);
    }
  });

  main.innerHTML = html;
}

function renderMCQ(q, idx, key) {
  const saved = answers[key];
  const letters = ['A','B','C','D'];
  let optHtml = '';
  q.opts.forEach((opt, oi) => {
    let cls = '';
    if (saved !== undefined) {
      if (oi === q.ans) cls = 'correct';
      else if (oi === saved.selected) cls = 'wrong';
    }
    optHtml += `<button class="option-btn ${cls}" ${saved !== undefined ? 'disabled' : ''} onclick="answerMCQ('${key}',${idx},${oi},${q.ans})">
      <span class="option-letter">${letters[oi]}</span>${opt}
    </button>`;
  });

  let feedbackHtml = '';
  if (saved !== undefined) {
    const correct = saved.correct;
    feedbackHtml = `<div class="feedback ${correct ? 'correct' : 'wrong'} show">
      ${correct ? '✓ Correct!' : `✗ Wrong. Correct answer: ${letters[q.ans]}) ${q.opts[q.ans]}`}
    </div>`;
  }

  const cardCls = saved !== undefined ? (saved.correct ? 'answered-correct' : 'answered-wrong') : '';

  return `<div class="q-card ${cardCls}" id="card-${key}">
    <div class="q-num">QUESTION ${idx+1}</div>
    <div class="q-text">${q.q}</div>
    <div class="options">${optHtml}</div>
    ${feedbackHtml}
  </div>`;
}

function renderTF(q, idx, key) {
  const saved = answers[key];
  let trueCls = '', falseCls = '';
  if (saved !== undefined) {
    if (q.ans === true) { trueCls = 'correct'; falseCls = saved.selected === false ? 'wrong' : ''; }
    else { falseCls = 'correct'; trueCls = saved.selected === true ? 'wrong' : ''; }
    // show reveal on the correct one if user was wrong
    if (saved.selected === true && q.ans === false) { falseCls = 'reveal'; }
    if (saved.selected === false && q.ans === true) { trueCls = 'reveal'; }
  }

  let correctionHtml = '';
  if (saved !== undefined && !saved.correct && q.correction) {
    correctionHtml = `<div class="correction-note show">📌 ${q.correction}</div>`;
  }

  const cardCls = saved !== undefined ? (saved.correct ? 'answered-correct' : 'answered-wrong') : '';

  return `<div class="q-card ${cardCls}" id="card-${key}">
    <div class="q-num">QUESTION ${idx+1}</div>
    <div class="q-text">${q.q}</div>
    <div class="tf-options">
      <button class="tf-btn true-btn ${trueCls}" ${saved !== undefined ? 'disabled' : ''} onclick="answerTF('${key}',${idx},true,${q.ans})">✓ True</button>
      <button class="tf-btn false-btn ${falseCls}" ${saved !== undefined ? 'disabled' : ''} onclick="answerTF('${key}',${idx},false,${q.ans})">✗ False</button>
    </div>
    ${correctionHtml}
    ${saved !== undefined ? `<div class="feedback ${saved.correct ? 'correct' : 'wrong'} show">${saved.correct ? '✓ Correct!' : '✗ Wrong!'}</div>` : ''}
  </div>`;
}

function renderEssay(q, idx, key) {
  const shown = essayShown[key];
  const savedText = answers[key]?.text || '';

  return `<div class="q-card ${shown ? 'answered-partial' : ''}" id="card-${key}">
    <div class="q-num">QUESTION ${idx+1}</div>
    <div class="q-text">${q.q}</div>
    <textarea class="essay-area" id="essay-${key}" placeholder="Write your answer here..." ${shown ? 'disabled' : ''}>${savedText}</textarea>
    <div class="essay-actions">
      ${!shown ? `<button class="check-btn" onclick="showEssayAnswer('${key}','${idx}')">Show Model Answer</button>` : '<span style="font-size:12px;color:var(--muted);font-family:Space Mono">Answer revealed ✓</span>'}
    </div>
    <div class="model-answer ${shown ? 'show' : ''}" id="model-${key}">
      <strong>📋 Model Answer:</strong>${q.ans}
    </div>
  </div>`;
}

// ANSWER HANDLERS
// ============================================================
function answerMCQ(key, idx, selected, correct) {
  const ta = document.getElementById(`essay-${key}`);
  if (answers[key] !== undefined) return;
  answers[key] = { selected, correct: selected === correct };
  updateScoreBar();
  // Re-render just this card
  const ch = DATA[currentChapter];
  const q = ch.mcq[idx];
  const card = document.getElementById(`card-${key}`);
  if (!card) return;
  const newCard = document.createElement('div');
  newCard.innerHTML = renderMCQ(q, idx, key);
  card.replaceWith(newCard.firstChild);
}

function answerTF(key, idx, selected, correctVal) {
  if (answers[key] !== undefined) return;
  const correct = selected === correctVal;
  answers[key] = { selected, correct };
  updateScoreBar();
  const ch = DATA[currentChapter];
  const q = ch.tf[idx];
  const card = document.getElementById(`card-${key}`);
  if (!card) return;
  const newCard = document.createElement('div');
  newCard.innerHTML = renderTF(q, idx, key);
  card.replaceWith(newCard.firstChild);
}

function showEssayAnswer(key, idx) {
  const ta = document.getElementById(`essay-${key}`);
  if (ta) answers[key] = { text: ta.value };
  essayShown[key] = true;
  updateScoreBar();
  const ch = DATA[currentChapter];
  const q = ch.essay[parseInt(idx)];
  const card = document.getElementById(`card-${key}`);
  if (!card) return;
  const newCard = document.createElement('div');
  newCard.innerHTML = renderEssay(q, parseInt(idx), key);
  card.replaceWith(newCard.firstChild);
}

// ============================================================
// RESULTS
// ============================================================
function showResults() {
  let correct = 0, wrong = 0, essay = 0;
  for (const val of Object.values(answers)) {
    if (val.correct === true) correct++;
    else if (val.correct === false) wrong++;
  }
  essay = Object.keys(essayShown).length;
  const total = getTotalQuestions();
  const pct = Math.round(((correct + essay) / total) * 100);

  document.getElementById('main-content').style.display = 'none';
  document.querySelector('.nav-section').style.display = 'none';
  document.querySelector('.finish-bar').style.display = 'none';

  const resultsEl = document.getElementById('results-screen');
  resultsEl.style.display = 'block';
  resultsEl.innerHTML = `
    <div style="font-family:'Space Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--muted);margin-bottom:24px;">QUIZ COMPLETE</div>
    <div class="results-ring" id="results-ring">
      <div class="results-ring-inner">
        <div class="result-pct">${pct}%</div>
        <div class="result-label">SCORE</div>
      </div>
    </div>
    <div class="result-breakdown">
      <div class="rb-item"><div class="rb-val g">${correct}</div><div class="rb-label">Correct</div></div>
      <div class="rb-item"><div class="rb-val r">${wrong}</div><div class="rb-label">Wrong</div></div>
      <div class="rb-item"><div class="rb-val y">${essay}</div><div class="rb-label">Essay Revealed</div></div>
      <div class="rb-item"><div class="rb-val" style="color:var(--text)">${total}</div><div class="rb-label">Total Questions</div></div>
    </div>
    <div style="color:var(--muted);font-size:14px;margin-bottom:32px;">
      ${pct >= 80 ? '🎉 Excellent work! You\'re well prepared.' : pct >= 60 ? '👍 Good job! Review the ones you missed.' : '📚 Keep studying! You\'ll get there.'}
    </div>
    <button class="restart-btn" onclick="restartQuiz()">↩ Back to Quiz</button>
  `;

  // Animate ring
  setTimeout(() => {
    const ring = document.getElementById('results-ring');
    if (ring) ring.style.background = `conic-gradient(var(--accent) ${pct}%, var(--border) ${pct}%)`;
  }, 200);
}

function restartQuiz() {
  document.getElementById('results-screen').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';
  document.querySelector('.nav-section').style.display = 'block';
  document.querySelector('.finish-bar').style.display = 'flex';
}

// ============================================================
// INIT
// ============================================================
window.onload = function() {
  renderNav();
  renderContent();
  updateScoreBar();
};
</script>

<div id="results-screen"></div>

</body>
</html>
